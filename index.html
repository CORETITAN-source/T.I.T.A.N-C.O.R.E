<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.O.R.E. OS // TITAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03080f;
            --panel-bg: rgba(7, 16, 30, 0.7);
            --cyan: #00f3ff;
            --text-main: #e0f7fa;
            --text-dim: #5c7b8f;
            --border: 1px solid rgba(0, 243, 255, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--panel-bg);
            border: var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .top-left { font-size: 1.5rem; font-weight: 700; letter-spacing: 4px; display: flex; align-items: center; gap: 15px; color: #fff; }
        .online-badge { font-size: 0.8rem; background: rgba(0, 255, 100, 0.1); color: #00ff64; padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(0, 255, 100, 0.3); letter-spacing: 1px; }
        .top-center { font-size: 1.1rem; color: var(--cyan); letter-spacing: 2px; }
        .top-right { font-size: 0.9rem; color: var(--text-dim); }

        /* Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: calc(100% - 80px);
        }
        
        @media (min-width: 1024px) {
            .main-grid { grid-template-columns: 300px 1fr 350px; }
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel-header { font-size: 1.1rem; font-weight: 600; color: var(--cyan); border-bottom: 1px solid rgba(0, 243, 255, 0.2); padding-bottom: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px;}

        /* Diagnostics - Hidden on small screens for clean mobile UI */
        .left-col { display: none; flex-direction: column; gap: 20px; }
        @media (min-width: 1024px) { .left-col { display: flex; } }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(0, 243, 255, 0.1); border-radius: 3px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .camera-feed { height: 120px; background: #000; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.8rem; font-style: italic; }

        /* Core Visualizer */
        .center-col { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .core-visual { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s ease; }
        .ring-1 { width: 100%; height: 100%; border-top: 4px solid var(--cyan); border-left: 4px solid var(--cyan); animation: spin-clockwise 6s linear infinite; box-shadow: 0 0 15px rgba(0,243,255,0.15);}
        .ring-2 { width: 80%; height: 80%; border-right: 3px solid rgba(0,243,255,0.6); border-bottom: 3px solid rgba(0,243,255,0.6); animation: spin-counter 4s linear infinite; }
        .ring-3 { width: 60%; height: 60%; border: 2px dashed rgba(0, 243, 255, 0.4); animation: spin-clockwise 10s linear infinite; }
        
        .core-center { width: 40%; height: 40%; background: rgba(0, 243, 255, 0.05); border: 2px solid rgba(0, 243, 255, 0.3); border-radius: 50%; box-shadow: inset 0 0 25px rgba(0, 243, 255, 0.1); animation: pulse 2s infinite; }
        
        .sys-title { margin-top: 30px; font-size: 2.8rem; font-weight: 700; letter-spacing: 8px; color: #fff; text-shadow: 0 0 15px var(--cyan); text-transform: uppercase;}
        .sub-title { font-size: 0.9rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: -5px; }
        .mic-status { margin-top: 20px; padding: 6px 20px; background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 20px; font-size: 0.85rem; color: var(--text-dim); }

        /* Listening State */
        .listening .ring-1, .listening .ring-2 { border-color: #ff003c; box-shadow: 0 0 20px rgba(255,0,60,0.3); }
        .listening .ring-3 { border-color: rgba(255,0,60,0.5); }
        .listening .core-center { border-color: #ff003c; box-shadow: inset 0 0 30px rgba(255, 0, 60, 0.2); }
        .listening-text { color: #ff003c !important; border-color: #ff003c !important; font-weight: bold; }

        /* Chat Log */
        .right-col { display: flex; flex-direction: column; height: 100%; min-height: 200px;}
        .chat-log { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 5px; }
        .chat-log::-webkit-scrollbar { width: 4px; }
        .chat-log::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.2); border-radius: 2px; }
        
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; animation: slideIn 0.3s ease-out; }
        .msg-user { background: rgba(0, 243, 255, 0.1); border-right: 2px solid var(--cyan); align-self: flex-end; border-bottom-right-radius: 0; color: #fff; }
        .msg-titan { background: rgba(255, 255, 255, 0.03); border-left: 2px solid #fff; align-self: flex-start; border-bottom-left-radius: 0; color: var(--text-main); }
        .msg-sys { background: transparent; color: var(--text-dim); font-style: italic; font-size: 0.8rem; align-self: center; text-align: center; }

        @keyframes spin-clockwise { 100% { transform: rotate(360deg); } }
        @keyframes spin-counter { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-left">C.O.R.E. <span class="online-badge">● Online</span></div>
        <div class="top-center" id="clock">00:00:00</div>
        <div class="top-right">SYS.OP // STARK_PROTO v2.0</div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="panel">
                <div class="panel-header">System Telemetry <span>⟳</span></div>
                <div>
                    <div class="stat-row"><span>Compute Load</span><span>11%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 11%;"></div></div>
                    <div class="stat-row"><span>Neural Link</span><span>85%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 85%;"></div></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">Sensors <span>📷</span></div>
                <div class="camera-feed">Awaiting permission...</div>
            </div>
        </div>

        <div class="center-col">
            <div class="core-visual" id="core-btn">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="core-center"></div>
            </div>
            <div class="sys-title">TITAN</div>
            <div class="sub-title">Adaptive Interface</div>
            <div class="mic-status" id="mic-status">● INITIALIZE VOICE LOG</div>
        </div>

        <div class="right-col panel">
            <div class="panel-header">SYS.LOG // CORE_OS</div>
            <div class="chat-log" id="chat-log">
                <div class="msg msg-sys">C.O.R.E. v2.0 Standby. Click visualization to authorize TITAN.</div>
            </div>
        </div>
    </div>

    <script>
        // 🛑 PASTE YOUR RENDER URL RIGHT HERE 🛑
        const BACKEND_URL = "https://t-i-t-a-n-c-o-r-e.onrender.com";
        
        const coreBtn = document.getElementById('core-btn');
        const micStatus = document.getElementById('mic-status');
        const chatLog = document.getElementById('chat-log');
        const clock = document.getElementById('clock');
        let systemAwake = false;

        // HUD Clock
        setInterval(() => {
            const now = new Date();
            clock.innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            const prefix = sender === 'titan' ? 'TITAN: ' : sender === 'user' ? 'Operator: ' : '';
            msgDiv.innerText = `${prefix}${text}`;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage("CRITICAL ERROR: Speech module offline. Browsers without SpeechRecognition are unsupported.", "sys");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            coreBtn.addEventListener('click', () => {
                if (!systemAwake) {
                    systemAwake = true;
                    addMessage("Voice log authorization accepted. TITAN active.", "sys");
                    startListening();
                }
            });

            function startListening() {
                try {
                    recognition.start();
                    coreBtn.classList.add("listening");
                    micStatus.innerText = "● TITAN listening...";
                    micStatus.classList.add("listening-text");
                } catch (e) {}
            }

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                
                coreBtn.classList.remove("listening");
                micStatus.innerText = "● Processing link...";
                micStatus.classList.remove("listening-text");
                addMessage(userText, "user");

                try {
                    const response = await fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userText })
                    });
                    const data = await response.json();
                    
                    addMessage(data.reply, "titan");
                    speak(data.reply);
                } catch (error) {
                    addMessage("CORE Connection dropped. Re-establishing link...", "sys");
                    startListening();
                }
            };

            recognition.onend = () => {
                if (systemAwake && !window.speechSynthesis.speaking) {
                    startListening();
                }
            };
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Priority for formal female tone
            let preferredVoice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || 
                                 voices.find(v => v.lang.includes('en-GB')) ||
                                 voices.find(v => v.lang.includes('en-US') && v.name.includes('Female'));
            
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 1.1; 
            
            utterance.onend = () => { if (systemAwake) startListening(); };
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
